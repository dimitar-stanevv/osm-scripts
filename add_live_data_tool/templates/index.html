<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>add_live_data_tool</title>
  <link
    href="https://api.mapbox.com/mapbox-gl-js/v3.6.0/mapbox-gl.css"
    rel="stylesheet"
  />
  <style>
    :root {
      --bg: #0f1117;
      --panel: #171a23;
      --panel-2: #1f2330;
      --border: #2a2f3d;
      --text: #e5e7eb;
      --muted: #9ca3af;
      --accent: #f87171;
      --ok: #34d399;
      --warn: #f59e0b;
      --err: #f87171;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: var(--text);
      background: var(--bg);
      overflow: hidden;
    }

    #app {
      display: grid;
      grid-template-columns: 380px 1fr;
      height: 100vh;
    }

    #panel {
      background: var(--panel);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      min-width: 0;
      min-height: 0;
      height: 100%;
    }

    #panel header {
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    #panel header h1 {
      margin: 0;
      font-size: 15px;
      letter-spacing: 0.3px;
    }

    #panel header .actions {
      display: flex;
      gap: 6px;
    }

    .btn {
      background: var(--panel-2);
      color: var(--text);
      border: 1px solid var(--border);
      padding: 6px 10px;
      border-radius: 6px;
      font-size: 12px;
      cursor: pointer;
      transition: background 0.1s, border-color 0.1s;
    }
    .btn:hover { background: #262c3b; }
    .btn.primary {
      background: var(--accent);
      border-color: var(--accent);
      color: #0b1220;
      font-weight: 600;
    }
    .btn.primary:hover { filter: brightness(1.05); }
    .btn.danger {
      border-color: #512a2a;
      color: var(--err);
    }
    .btn.danger:hover { background: #2a1818; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    #summary {
      padding: 8px 16px;
      font-size: 12px;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
    }

    #points {
      flex: 1 1 0;
      min-height: 0;
      overflow-y: auto;
      padding: 8px 10px 16px;
    }

    .empty {
      padding: 24px;
      text-align: center;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
    }

    .point {
      background: var(--panel-2);
      border: 1px solid var(--border);
      border-radius: 8px;
      margin-bottom: 10px;
      padding: 10px 12px;
      font-size: 12.5px;
    }

    .point.active {
      border-color: var(--accent);
      box-shadow: 0 0 0 1px var(--accent) inset;
    }

    .point .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .point .idx {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: var(--accent);
      color: #0b1220;
      font-weight: 700;
      font-size: 12px;
      flex: 0 0 auto;
    }

    .point .coord {
      font-family: ui-monospace, "SF Mono", Menlo, monospace;
      font-size: 11px;
      color: var(--muted);
    }

    .status {
      font-size: 10.5px;
      padding: 2px 7px;
      border-radius: 999px;
      border: 1px solid var(--border);
      text-transform: uppercase;
      letter-spacing: 0.4px;
    }
    .status.pending { color: var(--warn); border-color: #40331a; background: #1d1810; }
    .status.ok      { color: var(--ok);   border-color: #1f3d2d; background: #0f1d15; }
    .status.failed  { color: var(--err);  border-color: #4a2222; background: #1e1010; }

    .enrichment {
      margin-top: 8px;
      padding: 8px 10px;
      background: #0f1219;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 11.5px;
      color: #cbd5e1;
      line-height: 1.55;
    }

    .enrichment .label {
      color: var(--muted);
      display: inline-block;
      min-width: 70px;
    }

    .enrichment .missing { color: #6b7280; font-style: italic; }

    .meta {
      margin-top: 8px;
      font-size: 11px;
      color: var(--muted);
      font-family: ui-monospace, "SF Mono", Menlo, monospace;
      display: grid;
      grid-template-columns: 70px 1fr;
      gap: 2px 10px;
    }
    .meta .k { color: #6b7280; }

    .fields {
      margin-top: 10px;
      display: grid;
      grid-template-columns: 70px 1fr;
      gap: 6px 10px;
      align-items: center;
    }

    .fields label {
      color: var(--muted);
      font-size: 11.5px;
    }

    .fields select {
      width: 100%;
      background: #0f1219;
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 5px;
      padding: 5px 8px;
      font-size: 12px;
      font-family: inherit;
    }
    .fields select:focus {
      outline: none;
      border-color: var(--accent);
    }

    .point .actions {
      display: flex;
      gap: 6px;
      margin-top: 10px;
      justify-content: flex-end;
    }

    #map {
      position: relative;
    }

    #map canvas { cursor: crosshair; }

    .marker {
      width: 28px;
      height: 28px;
      border-radius: 50% 50% 50% 0;
      background: var(--accent);
      transform: rotate(-45deg);
      border: 2px solid #0b1220;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: grab;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.5);
    }
    .marker span {
      transform: rotate(45deg);
      color: #0b1220;
      font-weight: 700;
      font-size: 12px;
    }
    .marker.active { background: #fbbf24; }
    .marker.failed { background: var(--err); }
    .marker.pending { background: var(--warn); }

    .hint {
      position: absolute;
      bottom: 12px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(15, 17, 23, 0.85);
      border: 1px solid var(--border);
      padding: 6px 12px;
      border-radius: 999px;
      color: var(--muted);
      font-size: 12px;
      pointer-events: none;
      backdrop-filter: blur(4px);
    }
  </style>
</head>
<body>
  <div id="app">
    <aside id="panel">
      <header>
        <h1>add_live_data_tool</h1>
        <div class="actions">
          <button class="btn" id="clearBtn" title="Remove all points">Clear</button>
          <button class="btn primary" id="exportBtn" title="Download points as GeoJSON">Export</button>
        </div>
      </header>
      <div id="summary">0 points</div>
      <div id="points">
        <div class="empty">
          Click anywhere on the map to add a mock live event.<br />
          Each point is enriched with reverse geocode and nearest OSM road.
        </div>
      </div>
    </aside>
    <div id="map">
      <div class="hint">Click the map to add a live event · drag markers to relocate</div>
    </div>
  </div>

  <script src="https://api.mapbox.com/mapbox-gl-js/v3.6.0/mapbox-gl.js"></script>
  <script>
    const MAPBOX_TOKEN = {{ mapbox_token | tojson }};
    mapboxgl.accessToken = MAPBOX_TOKEN;

    const map = new mapboxgl.Map({
      container: 'map',
      style: 'mapbox://styles/mapbox/streets-v12',
      center: [15, 50],
      zoom: 4,
    });
    map.addControl(new mapboxgl.NavigationControl({ visualizePitch: false }), 'top-right');
    map.addControl(new mapboxgl.GeolocateControl(), 'top-right');

    const points = new Map();
    let nextId = 1;
    let activeId = null;

    const $points = document.getElementById('points');
    const $summary = document.getElementById('summary');
    const $exportBtn = document.getElementById('exportBtn');
    const $clearBtn = document.getElementById('clearBtn');

    const TYPE_OPTIONS = [
      { value: 'hazard_pothole',         label: 'Hazard · pothole' },
      { value: 'hazard_construction',    label: 'Hazard · construction' },
      { value: 'hazard_object_on_road',  label: 'Hazard · object on road' },
      { value: 'hazard_vehicle_on_road', label: 'Hazard · vehicle on road' },
      { value: 'hazard_accident',        label: 'Hazard · accident' },
      { value: 'hazard_other',           label: 'Hazard · other' },
      { value: 'police',                 label: 'Police' },
      { value: 'police_mobile_camera',   label: 'Police · mobile camera' },
      { value: 'road_closure',           label: 'Road closure' },
    ];

    function fmtTimestamp(ms) {
      try {
        return new Date(ms).toISOString().replace('T', ' ').slice(0, 19) + ' UTC';
      } catch (_) {
        return String(ms);
      }
    }

    function createMarker(id, lngLat) {
      const el = document.createElement('div');
      el.className = 'marker pending';
      el.innerHTML = `<span>${id}</span>`;

      const marker = new mapboxgl.Marker({ element: el, draggable: true, anchor: 'bottom' })
        .setLngLat(lngLat)
        .addTo(map);

      el.addEventListener('click', (e) => {
        e.stopPropagation();
        setActive(id);
        scrollToRow(id);
      });

      marker.on('dragend', () => {
        const p = points.get(id);
        if (!p) return;
        const pos = marker.getLngLat();
        p.lng = pos.lng;
        p.lat = pos.lat;
        p.status = 'pending';
        p.enrichment = null;
        render();
        enrich(id);
      });

      return marker;
    }

    function setMarkerStatus(id, status) {
      const p = points.get(id);
      if (!p) return;
      const el = p.marker.getElement();
      el.classList.remove('pending', 'failed', 'active');
      if (status === 'pending') el.classList.add('pending');
      else if (status === 'failed') el.classList.add('failed');
      if (id === activeId) el.classList.add('active');
    }

    async function enrich(id) {
      const p = points.get(id);
      if (!p) return;
      p.status = 'pending';
      render();
      try {
        const resp = await fetch('/api/enrich', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ lng: p.lng, lat: p.lat }),
        });
        if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
        const data = await resp.json();
        const current = points.get(id);
        if (!current) return;
        if (data.snapped && Number.isFinite(data.snapped.lng) && Number.isFinite(data.snapped.lat)) {
          current.lng = data.snapped.lng;
          current.lat = data.snapped.lat;
          current.marker.setLngLat([current.lng, current.lat]);
        }
        current.enrichment = data;
        current.status = 'ok';
      } catch (err) {
        console.error('enrich error', err);
        const current = points.get(id);
        if (current) current.status = 'failed';
      }
      render();
    }

    function addPoint(lng, lat) {
      const id = nextId++;
      const ts = Date.now();
      const marker = createMarker(id, [lng, lat]);
      points.set(id, {
        id,
        feature_id: String(ts),
        published_at: ts,
        lng, lat, marker,
        status: 'pending',
        enrichment: null,
        type: 'police',
      });
      setActive(id);
      render();
      enrich(id);
    }

    function deletePoint(id) {
      const p = points.get(id);
      if (!p) return;
      p.marker.remove();
      points.delete(id);
      if (activeId === id) activeId = null;
      render();
    }

    function clearAll() {
      if (points.size === 0) return;
      if (!confirm(`Remove all ${points.size} point(s)?`)) return;
      for (const p of points.values()) p.marker.remove();
      points.clear();
      activeId = null;
      nextId = 1;
      render();
    }

    function setActive(id) {
      activeId = id;
      for (const p of points.values()) {
        setMarkerStatus(p.id, p.status);
      }
    }

    function scrollToRow(id) {
      const row = document.querySelector(`[data-point-id="${id}"]`);
      if (row) row.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    function fmt(v, fallback = '—') {
      if (v === null || v === undefined || v === '') return `<span class="missing">${fallback}</span>`;
      return String(v);
    }

    function renderEnrichment(p) {
      if (p.status === 'pending') {
        return `<div class="enrichment"><span class="label">Status:</span> enriching…</div>`;
      }
      if (p.status === 'failed') {
        return `<div class="enrichment"><span class="label">Status:</span> <span style="color: var(--err)">failed</span></div>`;
      }
      const e = p.enrichment || {};
      const rg = e.rev_geocode || {};
      const road = e.osm_road || {};
      const roadName = road.names ? (road.names.name || Object.values(road.names)[0]) : null;
      return `
        <div class="enrichment">
          <div><span class="label">Address:</span> ${fmt(rg.full_address)}</div>
          <div><span class="label">Country:</span> ${fmt(e.country)}</div>
          <div><span class="label">Road:</span> ${fmt(roadName)} ${road.road_ref ? `(${road.road_ref})` : ''} ${road.road_class ? `· ${road.road_class}` : ''}</div>
          <div><span class="label">Distance:</span> ${road.distance != null ? road.distance + ' m' : '<span class="missing">—</span>'}</div>
        </div>
      `;
    }

    function render() {
      $summary.textContent = `${points.size} point${points.size === 1 ? '' : 's'}`;
      $exportBtn.disabled = points.size === 0;
      $clearBtn.disabled = points.size === 0;

      if (points.size === 0) {
        $points.innerHTML = `
          <div class="empty">
            Click anywhere on the map to add a mock live event.<br />
            Each point is enriched with reverse geocode and nearest OSM road.
          </div>
        `;
        return;
      }

      const rows = [];
      for (const p of points.values()) {
        rows.push(`
          <div class="point ${p.id === activeId ? 'active' : ''}" data-point-id="${p.id}">
            <div class="row">
              <div style="display:flex; align-items:center; gap:8px;">
                <span class="idx">${p.id}</span>
                <span class="coord">${p.lng.toFixed(5)}, ${p.lat.toFixed(5)}</span>
              </div>
              <span class="status ${p.status}">${p.status}</span>
            </div>
            ${renderEnrichment(p)}
            <div class="meta">
              <div class="k">id</div><div>${p.feature_id}</div>
              <div class="k">published</div><div>${fmtTimestamp(p.published_at)}</div>
            </div>
            <div class="fields">
              <label for="type-${p.id}">Type</label>
              <select id="type-${p.id}" data-id="${p.id}" data-field="type">
                ${TYPE_OPTIONS.map(o => `<option value="${o.value}" ${o.value === p.type ? 'selected' : ''}>${o.label}</option>`).join('')}
              </select>
            </div>
            <div class="actions">
              ${p.status === 'failed' ? `<button class="btn" data-action="retry" data-id="${p.id}">Retry</button>` : ''}
              <button class="btn" data-action="focus" data-id="${p.id}">Fly to</button>
              <button class="btn danger" data-action="delete" data-id="${p.id}">Delete</button>
            </div>
          </div>
        `);
      }
      $points.innerHTML = rows.join('');
    }

    $points.addEventListener('input', (e) => {
      const t = e.target;
      const id = Number(t.dataset.id);
      const field = t.dataset.field;
      if (!id || !field) return;
      const p = points.get(id);
      if (!p) return;
      if (field === 'type') {
        p.type = t.value;
      }
    });

    $points.addEventListener('click', (e) => {
      const btn = e.target.closest('button[data-action]');
      if (!btn) return;
      const id = Number(btn.dataset.id);
      const action = btn.dataset.action;
      if (action === 'delete') deletePoint(id);
      else if (action === 'retry') enrich(id);
      else if (action === 'focus') {
        const p = points.get(id);
        if (p) {
          map.flyTo({ center: [p.lng, p.lat], zoom: Math.max(map.getZoom(), 14) });
          setActive(id);
        }
      }
    });

    map.on('click', (e) => {
      addPoint(e.lngLat.lng, e.lngLat.lat);
    });

    $exportBtn.addEventListener('click', () => {
      const features = [];
      for (const p of points.values()) {
        const enrichment = p.enrichment || {};
        features.push({
          type: 'Feature',
          geometry: { type: 'Point', coordinates: [p.lng, p.lat] },
          properties: {
            id: p.feature_id,
            type: p.type,
            published_at: p.published_at,
            country: enrichment.country ?? null,
            reverse_geocode: enrichment.rev_geocode ?? null,
            osm_road: enrichment.osm_road ?? null,
          },
        });
      }
      const fc = { type: 'FeatureCollection', features };
      const blob = new Blob([JSON.stringify(fc, null, 2)], { type: 'application/geo+json' });
      const url = URL.createObjectURL(blob);
      const ts = new Date().toISOString().replace(/[:.]/g, '-').slice(0, 19);
      const a = document.createElement('a');
      a.href = url;
      a.download = `live_points_${ts}.geojson`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    });

    $clearBtn.addEventListener('click', clearAll);

    render();
  </script>
</body>
</html>
